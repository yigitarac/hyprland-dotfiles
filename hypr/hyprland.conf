########################################################################################
# NVIDIA & MONITOR AYARLARI VE ORTAM DEĞİŞKENLERİ
########################################################################################
monitor=eDP-1,1920x1080@144,0x0,1

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __NV_PRIME_RENDER_OFFLOAD,1
env = XCURSOR_THEME,Breeze_Light
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Breeze_Light
env = HYPRCURSOR_SIZE,24
env = BROWSER,helium

# XDG Desktop değişkenleri (Gecikmeleri önlemek için hayati önem taşır)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# QT (Dolphin vb. için) Değişkenleri
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct

# Mouse imleci sorununu çözen kritik ayar
cursor {
    no_hardware_cursors = true
}
########################################################################################
# INPUT (KLAVYE VE MOUSE)
########################################################################################
input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0 # Mouse hızı (0 varsayılandır)

    touchpad {
        natural_scroll = true
    }
}
general {
    gaps_in = 9
    gaps_out = 6      # 12 → 6 (bar ile pencere arası azalır)
    border_size = 2   # 3 → 2 (turuncu çizgi incelir)
    col.active_border = rgba(d79921ff) rgba(fabd2fff) 45deg
    col.inactive_border = rgba(504945aa)
}

decoration {
    rounding = 4      # 8 → 4 (köşeler daha sivri)
    active_opacity = 1.0
    inactive_opacity = 1.0
}
########################################################################################
# AUTOSTART (AÇILIŞTA ÇALIŞACAKLAR)
########################################################################################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = sleep 2 && blueman-applet
exec-once = swayosd-server
exec-once = hyprpaper

########################################################################################
# TUŞ ATAMALARI (SHORTCUTS)
########################################################################################
$mainMod = SUPER

bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = ALT, SPACE, exec, rofi -show drun
bind = $mainMod, H, exec, helium
# bind = $mainMod, B, exec, brave-browser-stable --password-store=kwallet --ozone-platform=wayland --enable-features=TouchpadOverscrollHistoryNavigation,Vulkan --use-angle=vulkan --use-gl=egl
bind = $mainMod, Z, exec, zed
bind = $mainMod, N, exec, swaync-client -t -sw
# bind = CTRL ALT, Delete, exec, wlogout
bind = CTRL ALT, Delete, exec, ~/.config/rofi/guc-menusu.sh
bind = , PRINT, exec, hyprshot -m output
bind = $mainMod, E, exec, dolphin
bind = ALT, PRINT, exec, hyprshot -m window
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Pencere Odaklama (Yön tuşlarıyla)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Çalışma Alanları (Workspaces)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Pencereyi Çalışma Alanına Taşıma
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Mouse ile pencere taşıma ve boyutlandırma
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

########################################################################################
# FN TUŞLARI (SES, PARLAKLIK VE MEDYA KONTROLÜ)
########################################################################################
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl = , xf86audioplay, exec, playerctl play-pause
bindl = , xf86audionext, exec, playerctl next
bindl = , xf86audioprev, exec, playerctl previous

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
