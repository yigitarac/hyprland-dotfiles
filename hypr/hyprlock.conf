background {
    monitor = eDP-1
    path = /home/yigit/Documents/wallpapers/wallpaperflare.com_wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    color = rgba(40, 40, 40, 1.0)
}

input-field {
    monitor = eDP-1
    size = 280, 70
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgb(235, 219, 178)
    inner_color = rgb(50, 48, 47)
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <b>Password...</b>
    hide_input = false
    check_color = rgb(184, 187, 38)
    fail_color = rgb(251, 73, 52)
    fail_text = <i>󰌾 $ATTEMPTS Failed</i>
    capslock_color = rgb(215, 153, 33)
    numlock_color = rgb(142, 192, 124)
    bothlock_color = rgb(211, 134, 155)
    invert_numlock = false
    shadow_passes = 2
    shadow_boost = 1.2
}

label {
    monitor = eDP-1
    text = cmd[update:1000] echo "<b>$(date +%H:%M:%S)</b>"
    color = rgba(235, 219, 178, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = <b> $USER</b>
    color = rgba(235, 219, 178, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = bottom
}
animations {
    enabled = true
    animation = fade, 0
    # Eğer üstteki satır hata verirse şunu kullan:
    # animation = fade, 0, 1, default
}